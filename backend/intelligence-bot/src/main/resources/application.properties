spring.application.name=intelligence-bot
gitlab.api.url=${GITLAB_API_URL:https://git.las.iastate.edu/api/v4}
gitlab.token=${GITLAB_TOKEN:}
analysis.python.url=${ANALYSIS_PYTHON_URL:http://localhost:5000/analyze}
analysis.read-only-mode=${ANALYSIS_READ_ONLY:true}
analysis.version=${ANALYSIS_VERSION:enterprise-v4-dual-engine-groq}
analysis.ai.enabled=${ANALYSIS_AI_ENABLED:true}
analysis.ai.groq.model=${GROQ_MODEL:openai/gpt-oss-20b}
analysis.ai.temperature=${AI_TEMPERATURE:0.2}
analysis.ai.max-tokens=${AI_MAX_TOKENS:1200}
analysis.ai.timeout-ms=${AI_TIMEOUT_MS:45000}
groq.api.key=${GROQ_API_KEY:}
repo.root=${REPO_ROOT:}
repo.max-files=${REPO_MAX_FILES:6}
repo.max-snippet-lines=${REPO_MAX_SNIPPET_LINES:80}
repo.max-file-size-kb=${REPO_MAX_FILE_SIZE_KB:256}
